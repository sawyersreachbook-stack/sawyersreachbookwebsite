<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sawyer's Reach — Author Playbook</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1a;
    --bg2: #0f1624;
    --bg3: #141d2e;
    --bg4: #1a2540;
    --teal: #1d9e8f;
    --teal-light: #2ec4b1;
    --teal-dim: #145f58;
    --gold: #c9a84c;
    --gold-light: #e2c97e;
    --gold-dim: #6b5520;
    --text: #e8edf5;
    --text-dim: #8899bb;
    --text-muted: #4a5a7a;
    --border: #1e2d4a;
    --border-bright: #2a3d5e;
    --red: #e05555;
    --green: #4caf7d;
    --sidebar-w: 260px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.7;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    width: var(--sidebar-w);
    background: var(--bg2);
    border-right: 1px solid var(--border);
    position: fixed;
    top: 0; left: 0; bottom: 0;
    overflow-y: auto;
    z-index: 100;
    display: flex;
    flex-direction: column;
  }

  .sidebar-brand {
    padding: 28px 20px 20px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-brand .book-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 900;
    color: var(--teal-light);
    letter-spacing: 0.05em;
    line-height: 1.2;
  }

  .sidebar-brand .book-sub {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-top: 4px;
  }

  .sidebar-brand .by-line {
    font-size: 12px;
    color: var(--gold);
    margin-top: 8px;
    font-style: italic;
  }

  nav { padding: 12px 0; flex: 1; }

  .nav-group-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    padding: 14px 20px 4px;
    font-weight: 600;
  }

  nav a {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 20px;
    color: var(--text-dim);
    text-decoration: none;
    font-size: 13.5px;
    font-weight: 400;
    border-left: 2px solid transparent;
    transition: all 0.15s;
  }

  nav a:hover { color: var(--text); background: rgba(29,158,143,0.06); border-left-color: var(--teal-dim); }
  nav a.active { color: var(--teal-light); background: rgba(29,158,143,0.1); border-left-color: var(--teal); font-weight: 500; }
  nav a .nav-icon { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; }

  .progress-area {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
  }

  .progress-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
  .progress-bar { height: 4px; background: var(--bg4); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--teal), var(--gold)); border-radius: 2px; transition: width 0.5s ease; }
  .progress-count { font-size: 11px; color: var(--text-dim); margin-top: 5px; }

  /* ── MAIN ── */
  #main {
    margin-left: var(--sidebar-w);
    flex: 1;
    max-width: 900px;
    padding: 48px 52px;
  }

  /* ── SECTIONS ── */
  .section { display: none; animation: fadeIn 0.25s ease; }
  .section.active { display: block; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* ── TYPOGRAPHY ── */
  .page-title {
    font-family: 'Playfair Display', serif;
    font-size: 38px;
    font-weight: 900;
    color: var(--text);
    line-height: 1.15;
    margin-bottom: 8px;
  }

  .page-subtitle {
    font-size: 15px;
    color: var(--text-dim);
    margin-bottom: 36px;
    font-style: italic;
    border-bottom: 1px solid var(--border);
    padding-bottom: 24px;
  }

    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight:
